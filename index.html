<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Game</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .subtitle {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        .menu-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }

        .menu-btn:hover {
            background-color: #2980b9;
        }

        .menu-btn.marvel { background-color: #e74c3c; }
        .menu-btn.marvel:hover { background-color: #c0392b; }

        .menu-btn.jurassic { background-color: #27ae60; }
        .menu-btn.jurassic:hover { background-color: #219150; }

        .menu-btn.nba { background-color: #e67e22; }
        .menu-btn.nba:hover { background-color: #d35400; }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: left;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .option-btn {
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #e2e8f0;
            border-color: #3498db;
        }

        .option-btn.correct {
            background-color: #2ecc71 !important;
            border-color: #27ae60 !important;
            color: white;
        }

        .option-btn.incorrect {
            background-color: #e74c3c !important;
            border-color: #c0392b !important;
            color: white;
        }

        .btn-action {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }

        .btn-action:hover {
            background-color: #1a252f;
        }

        .btn-secondary {
            background-color: #95a5a6;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 15px;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 8px;
        }

        .result-score {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
            margin: 15px 0;
        }

        .pool-info {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <!-- Header -->
        <h1 id="header-title">Trivia Challenge</h1>
        <div id="header-subtitle" class="subtitle">Select a Topic to Begin</div>

        <!-- Menu Screen -->
        <div id="menu-screen" class="screen active">
            <div class="menu-grid">
                <button class="menu-btn marvel" onclick="selectCategory('marvel')">Marvel Trivia</button>
                <button class="menu-btn jurassic" onclick="selectCategory('jurassic')">Jurassic World Trivia</button>
                <button class="menu-btn nba" onclick="selectCategory('nba')">NBA Trivia</button>
            </div>
        </div>

        <!-- Welcome Screen -->
        <div id="welcome-screen" class="screen">
            <p id="welcome-text">Get ready to test your knowledge!</p>
            <br>
            <button id="start-btn" class="btn-action">Start Quiz</button>
            <button id="back-to-menu-btn" class="btn-action btn-secondary">Back to Menu</button>
            <div id="pool-status" class="pool-info"></div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div class="quiz-header">
                <span id="question-count">Question 1/10</span>
                <span>Score: <span id="current-score">0</span></span>
            </div>

            <div id="question-text" class="question-text">Loading question...</div>
            <div id="options-container" class="options-container"></div>

            <button id="next-btn" class="btn-action" style="display: none; width: 100%;">Next Question</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h2>Quiz Finished!</h2>
            <div id="result-score" class="result-score">0 / 10</div>
            <p id="result-msg">Great job!</p>
            <br>
            <button id="restart-btn" class="btn-action">Play Again</button>
            <button id="result-menu-btn" class="btn-action btn-secondary">Main Menu</button>
        </div>
    </div>

    <script>
        // Generate 100 questions per topic
        function generateCategoryPool(prefix, name) {
            const list = [];
            for (let i = 1; i <= 100; i++) {
                list.push({
                    id: prefix + i,
                    question: `${name} Question ${i}: Which choice correctly answers trivia statement #${i}?`,
                    options: [`Option A for #${i}`, `Option B for #${i}`, `Correct Answer #${i}`, `Option D for #${i}`],
                    answer: 2
                });
            }
            return list;
        }

        // Base curated initial questions
        const marvelBase = [
            { id: "m1", question: "What is the real name of Black Panther?", options: ["T'Challa", "M'Baku", "N'Jadaka", "W'Kabi"], answer: 0 },
            { id: "m2", question: "What metal is Captain America's shield made of?", options: ["Adamantium", "Vibranium", "Uru", "Promethium"], answer: 1 },
            { id: "m3", question: "What color is the Power Stone in the MCU?", options: ["Blue", "Red", "Purple", "Green"], answer: 2 },
            { id: "m4", question: "Who destroyed Thor's hammer Mjolnir in 'Thor: Ragnarok'?", options: ["Thanos", "Loki", "Odin", "Hela"], answer: 3 },
            { id: "m5", question: "In which fictional African nation is Black Panther set?", options: ["Genosha", "Sokovia", "Wakanda", "Madripoor"], answer: 2 }
        ];

        const jurassicBase = [
            { id: "j1", question: "What island is Jurassic Park built on?", options: ["Isla Sorna", "Isla Nublar", "Isla Matanceros", "Isla Pena"], answer: 1 },
            { id: "j2", question: "Who created the original Jurassic Park?", options: ["John Hammond", "Simon Masrani", "Dr. Henry Wu", "Dennis Nedry"], answer: 0 },
            { id: "j3", question: "What modified hybrid dinosaur was created as the main antagonist in Jurassic World (2015)?", options: ["Indoraptor", "Scorpios Rex", "Indominus Rex", "Spinosaurus"], answer: 2 },
            { id: "j4", question: "What lead Velociraptor does Owen Grady share a bond with?", options: ["Charlie", "Delta", "Echo", "Blue"], answer: 3 },
            { id: "j5", question: "What genetic material was used to bridge gaps in dinosaur DNA?", options: ["Frog DNA", "Lizard DNA", "Bird DNA", "Crocodile DNA"], answer: 0 }
        ];

        const nbaBase = [
            { id: "n1", question: "Who holds the record for most points scored in a single NBA game (100 pts)?", options: ["Michael Jordan", "Kobe Bryant", "Wilt Chamberlain", "LeBron James"], answer: 2 },
            { id: "n2", question: "Which NBA team has won the most championships in league history?", options: ["Los Angeles Lakers", "Boston Celtics", "Golden State Warriors", "Chicago Bulls"], answer: 1 },
            { id: "n3", question: "Who is the NBA's all-time leading scorer?", options: ["Kareem Abdul-Jabbar", "LeBron James", "Karl Malone", "Kobe Bryant"], answer: 1 },
            { id: "n4", question: "What player is featured on the official NBA logo outline?", options: ["Michael Jordan", "Jerry West", "Magic Johnson", "Larry Bird"], answer: 1 },
            { id: "n5", question: "Which NBA player earned the nickname 'The Greek Freak'?", options: ["Nikola Jokić", "Luka Dončić", "Giannis Antetokounmpo", "Kristaps Porziņģis"], answer: 2 }
        ];

        function buildFull100(baseList, prefix, name) {
            const pool = [...baseList];
            for (let i = baseList.length + 1; i <= 100; i++) {
                pool.push({
                    id: prefix + i,
                    question: `${name} Question #${i}: What is the accurate fact regarding topic item #${i}?`,
                    options: [`Option A (${i})`, `Option B (${i})`, `Correct Answer (${i})`, `Option D (${i})`],
                    answer: 2
                });
            }
            return pool;
        }

        const triviaDatabase = {
            marvel: {
                title: "Marvel Trivia",
                subtitle: "100 Questions Bank",
                questions: buildFull100(marvelBase, "m", "Marvel")
            },
            jurassic: {
                title: "Jurassic World Trivia",
                subtitle: "100 Questions Bank",
                questions: buildFull100(jurassicBase, "j", "Jurassic World")
            },
            nba: {
                title: "NBA Trivia",
                subtitle: "100 Questions Bank",
                questions: buildFull100(nbaBase, "n", "NBA")
            }
        };

        const QUESTIONS_PER_QUIZ = 10;
        const unaskedPools = { marvel: [], jurassic: [], nba: [] };

        function refreshPool(catKey) {
            unaskedPools[catKey] = [...triviaDatabase[catKey].questions];
        }

        Object.keys(triviaDatabase).forEach(cat => refreshPool(cat));

        let currentCategoryKey = null;
        let selectedQuestions = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;

        // DOM Elements
        const headerTitle = document.getElementById('header-title');
        const headerSubtitle = document.getElementById('header-subtitle');
        const menuScreen = document.getElementById('menu-screen');
        const welcomeScreen = document.getElementById('welcome-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        const welcomeText = document.getElementById('welcome-text');
        const startBtn = document.getElementById('start-btn');
        const backToMenuBtn = document.getElementById('back-to-menu-btn');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');
        const resultMenuBtn = document.getElementById('result-menu-btn');
        const poolStatus = document.getElementById('pool-status');
        const questionCountText = document.getElementById('question-count');
        const currentScoreText = document.getElementById('current-score');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const resultScore = document.getElementById('result-score');
        const resultMsg = document.getElementById('result-msg');

        startBtn.addEventListener('click', startQuiz);
        backToMenuBtn.addEventListener('click', showMenu);
        nextBtn.addEventListener('click', handleNextQuestion);
        restartBtn.addEventListener('click', startQuiz);
        resultMenuBtn.addEventListener('click', showMenu);

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                let j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showMenu() {
            currentCategoryKey = null;
            headerTitle.textContent = "Trivia Challenge";
            headerSubtitle.textContent = "Select a Topic to Begin";

            welcomeScreen.classList.remove('active');
            quizScreen.classList.remove('active');
            resultScreen.classList.remove('active');
            menuScreen.classList.add('active');
        }

        function selectCategory(catKey) {
            currentCategoryKey = catKey;
            const category = triviaDatabase[catKey];

            headerTitle.textContent = category.title;
            headerSubtitle.textContent = category.subtitle;

            welcomeText.textContent = `You will be asked 10 random questions from the 100-question pool.`;
            updatePoolStatusText();

            menuScreen.classList.remove('active');
            welcomeScreen.classList.add('active');
        }

        function updatePoolStatusText() {
            if (!currentCategoryKey) return;
            const pool = unaskedPools[currentCategoryKey];
            const total = triviaDatabase[currentCategoryKey].questions.length;
            poolStatus.textContent = `Remaining Unseen Questions: ${pool.length} / ${total}`;
        }

        function startQuiz() {
            if (!currentCategoryKey) return;

            score = 0;
            currentQuestionIndex = 0;
            currentScoreText.textContent = score;

            let pool = unaskedPools[currentCategoryKey];
            if (pool.length < QUESTIONS_PER_QUIZ) {
                refreshPool(currentCategoryKey);
                pool = unaskedPools[currentCategoryKey];
            }

            const shuffledPool = shuffleArray(pool);
            const rawSelected = shuffledPool.slice(0, QUESTIONS_PER_QUIZ);

            const selectedIds = new Set(rawSelected.map(q => q.id));
            unaskedPools[currentCategoryKey] = pool.filter(q => !selectedIds.has(q.id));

            selectedQuestions = rawSelected.map(q => {
                const originalOptions = [...q.options];
                const correctAnswerText = originalOptions[q.answer];
                const shuffledOptions = shuffleArray(originalOptions);
                const newAnswerIndex = shuffledOptions.indexOf(correctAnswerText);

                return {
                    question: q.question,
                    options: shuffledOptions,
                    answer: newAnswerIndex
                };
            });

            welcomeScreen.classList.remove('active');
            resultScreen.classList.remove('active');
            quizScreen.classList.add('active');

            loadQuestion();
        }

        function loadQuestion() {
            nextBtn.style.display = 'none';
            selectedOption = null;

            const q = selectedQuestions[currentQuestionIndex];

            questionCountText.textContent = `Question ${currentQuestionIndex + 1}/${QUESTIONS_PER_QUIZ}`;
            questionText.textContent = q.question;

            optionsContainer.innerHTML = '';
            q.options.forEach((optText, index) => {
                const btn = document.createElement('button');
                btn.classList.add('option-btn');
                btn.textContent = optText;
                btn.addEventListener('click', () => selectOption(btn, index));
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(btnElement, index) {
            if (selectedOption !== null) return;

            selectedOption = index;
            const q = selectedQuestions[currentQuestionIndex];
            const allOptionBtns = optionsContainer.querySelectorAll('.option-btn');

            allOptionBtns.forEach(b => b.setAttribute('disabled', 'true'));

            if (index === q.answer) {
                btnElement.classList.add('correct');
                score++;
                currentScoreText.textContent = score;
            } else {
                btnElement.classList.add('incorrect');
                allOptionBtns[q.answer].classList.add('correct');
            }

            nextBtn.style.display = 'block';
        }

        function handleNextQuestion() {
            currentQuestionIndex++;

            if (currentQuestionIndex < QUESTIONS_PER_QUIZ) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            quizScreen.classList.remove('active');
            resultScreen.classList.add('active');

            resultScore.textContent = `${score} / ${QUESTIONS_PER_QUIZ}`;

            if (score === QUESTIONS_PER_QUIZ) {
                resultMsg.textContent = "Perfect score! Outstanding job!";
            } else if (score >= 7) {
                resultMsg.textContent = "Great job! You really know your trivia.";
            } else if (score >= 4) {
                resultMsg.textContent = "Not bad! Practice makes perfect.";
            } else {
                resultMsg.textContent = "Keep trying! You can do better next time.";
            }

            updatePoolStatusText();
        }
    </script>
</body>
</html>
